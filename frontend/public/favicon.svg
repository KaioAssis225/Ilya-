<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f5d78e"/>
      <stop offset="45%"  stop-color="#c8952e"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#c8952e" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#c8952e"/>
      <stop offset="100%" stop-color="#c8952e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Fundo escuro com cantos arredondados -->
  <rect width="32" height="32" rx="5" fill="#2c2420"/>

  <!-- Linha superior decorativa -->
  <rect x="7" y="6.5" width="18" height="0.8" rx="0.4" fill="url(#line)"/>

  <!-- Monograma "I" em estilo serifado dourado -->
  <text
    x="16" y="23"
    text-anchor="middle"
    dominant-baseline="auto"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="19"
    font-weight="400"
    fill="url(#gold)"
  >I</text>

  <!-- Linha inferior decorativa -->
  <rect x="7" y="25" width="18" height="0.8" rx="0.4" fill="url(#line)"/>
</svg>
